apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pipeline-frontend-hpa
  namespace: pipeline-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pipeline-frontend

  minReplicas: 2
  maxReplicas: 10

  metrics:
    # ── CPU Utilization ──────────────────────────────────────────────────
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization    # FIXED: Was AverageUtilization
          averageUtilization: 50

    # ── Memory Utilization ───────────────────────────────────────────────
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization    # FIXED: Was AverageUtilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120