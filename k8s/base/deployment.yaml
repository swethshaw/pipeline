apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-frontend
  namespace: pipeline-app
  labels:
    app: pipeline-frontend
    version: "1.0"
spec:
  replicas: 2                        # initial; HPA will control this
  selector:
    matchLabels:
      app: pipeline-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0              # zero-downtime deploys
  template:
    metadata:
      labels:
        app: pipeline-frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9113"   # nginx-exporter sidecar port
        prometheus.io/path:   "/metrics"
    spec:
      # ── Main container ──────────────────────────────────────────────────────
      containers:
        - name: frontend
          image: pipeline-frontend:latest   # replaced by CI/CD pipeline
          imagePullPolicy: IfNotPresent     # use local minikube image
          ports:
            - containerPort: 80
              name: http

          # Resource requests & limits (needed for HPA CPU-based scaling)
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "300m"
              memory: "256Mi"

          # Liveness – restart if app is unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds:       10
            failureThreshold:    3

          # Readiness – don't route traffic until ready
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds:       5

        # ── Nginx Prometheus Exporter sidecar ───────────────────────────────
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:0.11.0
          args:
            - -nginx.scrape-uri=http://localhost:80/nginx_status
          ports:
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              cpu:    "10m"
              memory: "16Mi"
            limits:
              cpu:    "50m"
              memory: "32Mi"

      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew:           1
          topologyKey:       kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: pipeline-frontend
