name: Build → Push → Deploy (Minikube)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: pipeline-frontend
  NAMESPACE:  pipeline-app

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build & Test
  # ──────────────────────────────────────────────────────────────────────────
  build-test:
    name: 🔨 Build & Test React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json  # 🔧 Looks in frontend/

      - name: Install dependencies
        working-directory: frontend                          # 🔧 Run inside frontend/
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build/                              # 🔧 Grab from frontend/build/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Docker Build & Push
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .                # 🔧 Context is ROOT folder
          file: app/Dockerfile      # 🔧 Dockerfile is in app/ folder
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy to Minikube
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Minikube
    runs-on: self-hosted
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag in deployment
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }}"
          sed -i "s|image: .*${{ env.IMAGE_NAME }}.*|image: $IMAGE|g" k8s/base/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/base/namespace.yaml
          kubectl apply -f k8s/base/deployment.yaml
          kubectl apply -f k8s/base/service.yaml
          kubectl apply -f k8s/hpa/hpa.yaml
          kubectl apply -f k8s/monitoring/grafana-dashboard-cm.yaml
          kubectl apply -f k8s/monitoring/alert-rules.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/pipeline-frontend -n ${{ env.NAMESPACE }} --timeout=3m